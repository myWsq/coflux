name: release

# 打 tag v* 触发：交叉编译 supervisor + worker → 签名 worker 产物 → 发布 GitHub Release（含 manifest）。
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, cross: true }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, cross: true }
          - { os: macos-latest, target: aarch64-apple-darwin, cross: false }
          - { os: macos-latest, target: x86_64-apple-darwin, cross: false }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: 构建
        env:
          # supervisor 编译期版本注入（见 crates/supervisor/src/main.rs::SUPERVISOR_VERSION、build.rs）。
          COFLUX_RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p coflux-supervisor -p coflux-worker
          else
            cargo build --release --target ${{ matrix.target }} -p coflux-supervisor -p coflux-worker
          fi

      # macOS 专属：cargo 交叉/原生编译产物只有 ad-hoc 签名，launchd 直接 spawn 的新鲜下载二进制
      # 会被 Gatekeeper 判 OS_REASON_CODESIGNING 静默 SIGKILL（本地手动重签名可绕过，但正式发布用
      # 真 Developer ID 证书签名 + 公证从根上解决，用户端零手动步骤）。裸二进制不支持 stapling
      # （仅 .app/.pkg/.dmg 支持），故不 staple——Gatekeeper 首次执行时联网向苹果查公证记录。
      - name: Apple 签名 + 公证（仅 macOS）
        if: ${{ !matrix.cross }}
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_API_KEY_P8: ${{ secrets.NOTARY_API_KEY_P8 }}
        run: |
          set -euo pipefail
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEY_PATH="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"

          echo -n "$MACOS_CERT_P12" | base64 --decode > "$CERT_PATH"
          echo -n "$NOTARY_API_KEY_P8" > "$KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/"//g')

          SIGN_ID="Developer ID Application: Shuaiqi Wang (${APPLE_TEAM_ID})"
          bin="target/${{ matrix.target }}/release"
          for name in coflux-supervisor coflux-worker; do
            codesign --force --options runtime --timestamp --sign "$SIGN_ID" "$bin/$name"
            ditto -c -k --keepParent "$bin/$name" "$RUNNER_TEMP/$name.zip"
            SUBMIT_OUT=$(xcrun notarytool submit "$RUNNER_TEMP/$name.zip" \
              --key "$KEY_PATH" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait 2>&1) || {
              echo "$SUBMIT_OUT"
              SUB_ID=$(echo "$SUBMIT_OUT" | grep -m1 '  id:' | awk '{print $2}')
              [ -n "$SUB_ID" ] && xcrun notarytool log "$SUB_ID" --key "$KEY_PATH" --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID"
              exit 1
            }
            echo "$SUBMIT_OUT"
            codesign -dv --verbose=2 "$bin/$name"
          done

          security delete-keychain "$KEYCHAIN"
          rm -f "$CERT_PATH" "$KEY_PATH"

      - name: 打包产物
        run: |
          mkdir -p dist
          bin="target/${{ matrix.target }}/release"
          # 原始二进制（稳定命名，cofluxd 直接按 /releases/latest/download/<名> 取）：
          #   worker 还是热升级下载+验签的对象（会被签名）
          cp "$bin/coflux-supervisor" "dist/coflux-supervisor-${{ matrix.target }}"
          cp "$bin/coflux-worker" "dist/coflux-worker-${{ matrix.target }}"
          # tar.gz：含两个二进制，供人工安装
          tar -C "$bin" -czf "dist/coflux-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" coflux-supervisor coflux-worker

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 签名 worker 产物 + 生成 manifest/SHA256SUMS
        env:
          WORKER_SIGNING_KEY: ${{ secrets.WORKER_SIGNING_KEY }}
        run: node scripts/release-sign.mjs artifacts "${{ github.ref_name }}"

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
