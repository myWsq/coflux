name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # 黑盒测试的 server 存储层是 Postgres（plan 002），harness 按
    # postgres://postgres:postgres@127.0.0.1:5432/postgres 建临时库（见 tests/src/harness.mjs）。
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      # 协议真相源治理（plan 009）：lint + 破坏性变更拦截 + 生成产物零 diff
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: 协议 lint + breaking + 生成产物一致性
        run: |
          cd proto
          buf lint
          # 只有 main 已存在 proto/ 基线时才做 breaking 拦截（首个提交无基线）
          git fetch --depth 1 origin main
          if git cat-file -e "$(git rev-parse FETCH_HEAD)":proto/buf.yaml 2>/dev/null; then
            buf breaking --against "../.git#ref=$(git rev-parse FETCH_HEAD),subdir=proto"
          else
            echo "::notice::main 尚无 proto 基线，跳过 breaking 检查"
          fi
          buf generate
          git diff --exit-code -- ../packages/protocol/src/gen ../crates/protocol/src/gen gen/swift

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: 类型检查（server + web）
        run: |
          node_modules/.bin/tsc -p apps/server/tsconfig.json --noEmit
          node_modules/.bin/tsc -b apps/web/tsconfig.json

      - name: Rust 单元测试（协议帧/serde）
        run: cargo test -p coflux-protocol

      - name: Rust 构建
        run: cargo build -p coflux-supervisor -p coflux-worker

      - name: 黑盒集成测试（pretest 构建 daemon，跑全量）
        run: pnpm -C tests test
